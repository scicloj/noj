on:
  push:
    tags:
      - "*"

jobs:
  clojars:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: jlesquembre/clojars-publish-action@0.4
        env:
          CLOJARS_USERNAME: ${{ secrets.CLOJARS_USERNAME }}
          CLOJARS_PASSWORD: ${{ secrets.CLOJARS_PASSWORD }}

  jupyter-kernel:
    runs-on: ubuntu-latest
    steps:
       - uses: actions/checkout@v6.0.2

       - name: Prepare java
         uses: actions/setup-java@v5.2.0 
         with:
           distribution: 'zulu'
           java-version: '17'

       - name: Install clojure tools
         uses: DeLaGuardo/setup-clojure@13.6.0
         with:
            cli: 1.12.5.1638

       - name: create clojupyter kernel
         run: clojure -T:build create-uber-clojupyter

       - name: create clay kernel kernel
         run: clojure -T:build create-uber-clay
               
       - name: Release
         uses: softprops/action-gh-release@v3
         with:
          files: target/*.jar    
